<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hope In Action Association| Donate</title>
  <style>
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      margin: 0;
      background: #ffffff;
      color: #333;
      line-height: 1.6;
    }
    header {
      background: linear-gradient(to right, #1e3c72, #2a5298);
      color: #fff;
      padding: 40px 20px;
      text-align: center;
    }
    nav {
      background: #1e3c72;
      padding: 15px;
      text-align: center;
    }
    nav a {
      color: #fff;
      margin: 0 12px;
      padding: 10px 18px;
      text-decoration: none;
      border-radius: 25px;
      transition: background 0.3s ease;
    }
    nav a:hover {
      background: #2a5298;
    }
    .container {
      width: 90%;
      max-width: 900px;
      margin: 20px auto;
    }
    section {
      background: #f0f8ff;
      padding: 20px;
      margin-bottom: 20px;
      border-radius: 8px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }
    h2 {
      color: #1e3c72;
    }
    .button {
      display: inline-block;
      padding: 12px 25px;
      background: #2a5298;
      color: #fff;
      border-radius: 6px;
      font-weight: bold;
      text-decoration: none;
      transition: background 0.3s ease, transform 0.2s ease;
    }
    .button:hover {
      background: #0d47a1;
      transform: scale(1.05);
    }
    input, select, textarea {
      width: 100%;
      padding: 10px;
      margin-top: 5px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 1em;
    }
    footer {
      background: #1e3c72;
      color: #fff;
      text-align: center;
      padding: 15px;
      margin-top: 30px;
    }
    .impact {
      font-weight: bold;
      color: #0d47a1;
    }
